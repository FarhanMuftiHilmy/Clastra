version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: scholasync-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scholasync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scholasync"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scholasync-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@db:5432/scholasync?sslmode=disable
      - JWT_SECRET=scholasync-super-secret-signature-key-2026
      - ALLOWED_CORS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scholasync-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_USE_API=true
      - VITE_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
